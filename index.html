<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <h1>COFFEE SHOP</h1>

        <p>Fresh Coffee Everyday</p>

        <input 
            type="text" 
            id="searchInput" 
            placeholder="Cari menu kopi..."
        >

    </header>

    <main>

        <div id="loading">
            Loading menu...
        </div>

        <div id="error"></div>

        <div 
            class="product-container" 
            id="productContainer"
        ></div>

    </main>

    <script src="script.js"></script>

</body>
</html>
